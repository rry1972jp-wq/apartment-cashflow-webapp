<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f3d3e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="収支シミュレーション" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <title>アパート収支シミュレーション</title>
    <link rel="manifest" href="./manifest.json?v=20260716-11" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./styles.css?v=20260716-11" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Apartment Cashflow</p>
        <h1>アパート収支シミュレーション</h1>
      </div>
      <button id="resetBtn" class="icon-button" type="button" aria-label="初期化">↺</button>
    </header>

    <nav class="tabs" aria-label="画面切替">
      <button class="tab active" data-view="summary" type="button">表紙</button>
      <button class="tab" data-view="proposal" type="button">顧客提示</button>
      <button class="tab" data-view="inputs" type="button">入力</button>
      <button class="tab" data-view="rentroll" type="button">レントロール</button>
      <button class="tab" data-view="costs" type="button">諸費用</button>
      <button class="tab" data-view="annual" type="button">年次収支</button>
      <button class="tab" data-view="debt" type="button">借入返済</button>
      <button class="tab" data-view="sensitivity" type="button">感度分析</button>
      <button class="tab" data-view="sale" type="button">売却</button>
    </nav>

    <main>
      <section id="summary" class="view active"></section>
      <section id="proposal" class="view"></section>
      <section id="inputs" class="view"></section>
      <section id="rentroll" class="view"></section>
      <section id="costs" class="view"></section>
      <section id="annual" class="view"></section>
      <section id="debt" class="view"></section>
      <section id="sensitivity" class="view"></section>
      <section id="sale" class="view"></section>
    </main>

    <div class="bottom-actions">
      <button id="saveBtn" class="primary" type="button">保存</button>
      <button id="printBtn" type="button">PDF / 印刷</button>
    </div>

    <script src="./app.js?v=20260716-11"></script>
    <script>
      if ("serviceWorker" in navigator && location.protocol !== "file:") {
        navigator.serviceWorker.register("./sw.js?v=20260716-11").catch(() => {});
      }
    </script>
  </body>
</html>
